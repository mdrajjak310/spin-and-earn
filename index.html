<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin and Earn</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #1a1a1a;
            color: white;
            padding: 20px;
        }
        .balance-box {
            font-size: 24px;
            margin-bottom: 20px;
            background: #333;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }
        .wheel-container {
            margin: 20px auto;
            width: 300px;
            height: 300px;
            border: 5px solid #fff;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .wheel {
            width: 100%;
            height: 100%;
            background: conic-gradient(
                #ff3366 0deg 60deg, #ff9933 60deg 120deg, 
                #ffff33 120deg 180deg, #33cc33 180deg 240deg, 
                #3399ff 240deg 300deg, #9933ff 300deg 360deg
            );
        }
        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff3366;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .btn {
            background: linear-gradient(135deg, #ff3366, #ff9933);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(255, 51, 102, 0.3);
            transition: 0.3s;
        }
        .btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn-watch {
            background: linear-gradient(135deg, #3399ff, #9933ff);
            box-shadow: 0 5px 15px rgba(51, 153, 255, 0.3);
        }
        .referral-box {
            margin-top: 30px;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="balance-box">
        Coins: <span id="balance">0</span>
    </div>

    <div style="position: relative; width: 310px; margin: 0 auto;">
        <div class="pointer"></div>
        <div class="wheel-container" id="wheel">
            <div class="wheel"></div>
        </div>
    </div>

    <div class="spins-left" id="spinStatus">Free Spins Left: 3</div>

    <button class="btn" id="spinBtn" onclick="handleSpin()">🎰 Spin Wheel</button>
    <button class="btn btn-watch" onclick="watchVideoAd()">📺 Watch Video (Earn Coins)</button>

    <div class="referral-box">
        <strong>🔗 Invite Friends & Earn:</strong><br>
        Get <span style="color: #00ffcc;">0.5% Lifetime Commission</span> from everything your friends earn!<br><br>
        <input type="text" id="refLink" value="https://t.me/your_bot_name?start=user123" readonly style="width:80%; text-align:center; background:#222; color:#fff; border:1px solid #555; padding:5px; border-radius:5px;">
    </div>

    <script>
        let coins = parseInt(localStorage.getItem('user_coins')) || 0;
        let freeSpins = localStorage.getItem('free_spins') !== null ? parseInt(localStorage.getItem('free_spins')) : 3;

        document.getElementById('balance').innerText = coins;
        updateSpinStatus();

        function updateSpinStatus() {
            if (freeSpins > 0) {
                document.getElementById('spinStatus').innerText = `Free Spins Left: ${freeSpins}`;
            } else {
                document.getElementById('spinStatus').innerText = "🔴 Watch 1 Video = Get 1 Spin";
            }
        }

        function handleSpin() {
            if (freeSpins > 0) {
                freeSpins--;
                localStorage.setItem('free_spins', freeSpins);
                updateSpinStatus();
                startSpinning();
            } else {
                alert("You don't have free spins! Loading a video to unlock 1 Spin...");
                watchVideoAdForSpin();
            }
        }

        function startSpinning() {
            const wheel = document.getElementById('wheel');
            const randomDegree = Math.floor(Math.random() * 360) + 1440; 
            wheel.style.transform = `rotate(${randomDegree}deg)`;
            document.getElementById('spinBtn').disabled = true;

            setTimeout(() => {
                document.getElementById('spinBtn').disabled = false;
                const rewards = [10, 20, 50, 100, 15, 30];
                const finalReward = rewards[Math.floor(Math.random() * rewards.length)];
                coins += finalReward;
                localStorage.setItem('user_coins', coins);
                document.getElementById('balance').innerText = coins;
                alert(`🎉 Congratulations! You won ${finalReward} Coins!`);
            }, 4000);
        }

        function watchVideoAd() {
    alert("Loading advertisement... Please wait 20 seconds to claim your coins.");

    const myAdLink = 'https://omg10.com/4/11216757';
    window.open(myAdLink, '_blank');

    // ২০ সেকেন্ড (২০০০ মিলিসেকেন্ড = ২০ সেকেন্ড) পর কয়েন যোগ হবে
    setTimeout(() => {
        coins += 25;
        localStorage.setItem('user_coins', coins);
        document.getElementById('balance').innerText = coins;
        alert("✅ Video watched successfully! You earned 25 Coins.");
    }, 20000); 
}

function watchVideoAdForSpin() {
    alert("Loading advertisement... Please wait 20 seconds to unlock 1 Spin.");

    const myAdLink = 'https://omg10.com/4/11216757';
    window.open(myAdLink, '_blank');

    // ২০ সেকেন্ড পর স্পিন যোগ হবে
    setTimeout(() => {
        freeSpins += 1;
        localStorage.setItem('free_spins', freeSpins);
        updateSpinStatus();
        alert("Video finished! 1 Spin has been credited. You can spin now!");
    }, 20000); 
}

        function watchVideoAdForSpin() {
            alert("Loading monetization video ad...");
            
            // স্পিন লক খোলার বিজ্ঞপ্তির জন্য
            const myAdLink = 'https://omg10.com/4/11216757'; 
            window.open(myAdLink, '_blank');

            setTimeout(() => {
                freeSpins += 1;
                localStorage.setItem('free_spins', freeSpins);
                updateSpinStatus();
                alert("Video finished! 1 Spin has been credited. You can spin now!");
            }, 1000);
        }
    </script>
</body>
</html>
